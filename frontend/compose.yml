services:
  frontend:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        WORKING_DIR: ${WORKING_DIR}
    env_file:
      - ./.env
    volumes:
      - ./app:${WORKING_DIR}
    ports:
      - ${PORT}:${PORT}
    command: sh -lc "rm -f tmp/pids/server.pid && npm run dev -- --port $$PORT --host 0.0.0.0"

