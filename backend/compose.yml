services:
  backend:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        BUNDLE_PATH: ${BUNDLE_PATH}
        WORKING_DIR: ${WORKING_DIR}
    env_file:
      - ./.env
    volumes:
      - bundle_dir:${BUNDLE_PATH}
      - ./app:${WORKING_DIR}
    command: sh -lc "rm -rf tmp/pids/server.pid && bundle exec rails s -p $$PORT -b '0.0.0.0'"

volumes:
  bundle_dir:
